<!--
  signup.html — VentureVerse Registration Page
  ==============================================
  This page lets new users create an account.

  How it works:
    1. User enters name, email, password, and confirms password
    2. Form submits a POST request to /signup (handled by app.py)
    3. Server validates: all fields filled, passwords match, 6+ chars
    4. If valid → creates account in database → auto-login → redirect
    5. If invalid → this page reloads with an error message

  Jinja variables:
    - error : error message string (None if no error)
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VentureVerse | Sign Up</title>

  <!-- Favicon (browser tab icon) -->
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}?v=3">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  TOP NAVIGATION BAR                                     -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <header class="topbar">
    <div class="container topbar-inner">

      <!-- Logo and brand name -->
      <a href="{{ url_for('home') }}" class="brand" style="text-decoration: none; color: inherit;">
        <div class="logo-mark">
          <div class="bar bar-1"></div>
          <div class="bar bar-2"></div>
          <div class="bar bar-3"></div>
        </div>
        <span class="brand-name">VentureVerse</span>
      </a>

      <!-- Navigation links -->
      <div class="nav-links">
        <a class="nav-pill" href="{{ url_for('login') }}">Login</a>
        <a class="nav-pill" href="{{ url_for('news') }}">News</a>
        <a class="btn-nav active" href="{{ url_for('signup') }}">Sign Up</a>
      </div>

    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  SIGNUP FORM                                             -->
  <!--  Centered card with name, email, password fields         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <main class="container">
    <div class="auth-wrapper animate-in">
      <div class="auth-card">

        <!-- Header text -->
        <div class="auth-header">
          <h2>Create Account</h2>
          <p>Join VentureVerse to predict startup success</p>
        </div>

        <!-- Show error message if signup failed -->
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        <!-- Signup form -->
        <form action="{{ url_for('signup') }}" method="POST" class="auth-form">

          <!-- Full name field -->
          <div class="field">
            <label>Full Name</label>
            <input type="text" name="full_name" placeholder="Your full name" required>
          </div>

          <!-- Email field -->
          <div class="field">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
          </div>

          <!-- Password field -->
          <div class="field">
            <label>Password</label>
            <input type="password" name="password" id="password" placeholder="Min 8 characters" required>
            
            <!-- Password Strength Indicator -->
            <div id="password-requirements" class="req-box">
              <div id="length" class="req invalid">❌ 8+ characters</div>
              <div id="uppercase" class="req invalid">❌ 1 uppercase letter</div>
              <div id="number" class="req invalid">❌ 1 number</div>
              <div id="special" class="req invalid">❌ 1 special char (!@#$%^&*)</div>
            </div>
          </div>

          <!-- Confirm password field -->
          <div class="field">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Re-enter password" required>
          </div>

          <!-- Submit button -->
          <button class="btn-submit" type="submit" id="submit-btn" style="margin-top:8px;" disabled>Create Account &rarr;</button>
        </form>

        <!-- Link to login page -->
        <div class="auth-footer">
          Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>

      </div>
    </div>
  </main>

  <style>
    /* Requirement Box Styles */
    .req-box {
      margin-top: 10px;
      padding: 12px;
      background: var(--slate-100);
      border-radius: 8px;
      border: 1px solid var(--slate-200);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .req {
      font-size: 12px;
      font-weight: 600;
      transition: color 0.2s;
    }
    .req.invalid { color: var(--red); }
    .req.valid { color: var(--green); }

    /* Button disabled style */
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
  </style>

  <script>
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    
    const requirements = {
      length: { re: /.{8,}/, el: document.getElementById('length') },
      uppercase: { re: /[A-Z]/, el: document.getElementById('uppercase') },
      number: { re: /[0-9]/, el: document.getElementById('number') },
      special: { re: /[!@#$%^&*]/, el: document.getElementById('special') }
    };

    passwordInput.addEventListener('input', () => {
      const value = passwordInput.value;
      let allValid = true;

      for (const key in requirements) {
        const isValid = requirements[key].re.test(value);
        const el = requirements[key].el;
        
        if (isValid) {
          el.classList.remove('invalid');
          el.classList.add('valid');
          el.innerHTML = '✅ ' + el.innerHTML.split(' ').slice(1).join(' ');
        } else {
          el.classList.remove('valid');
          el.classList.add('invalid');
          el.innerHTML = '❌ ' + el.innerHTML.split(' ').slice(1).join(' ');
          allValid = false;
        }
      }

      submitBtn.disabled = !allValid;
    });
  </script>

</body>
</html>
