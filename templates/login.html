<!--
  login.html — VentureVerse Login Page
  ====================================
  This page lets returning users sign in with their email + password.

  How it works:
    1. User enters email and password into the form
    2. Form submits a POST request to /login (handled by app.py)
    3. If credentials are correct → redirect to prediction page
    4. If wrong → this page reloads with an error message

  Jinja variables:
    - error : error message string (None if no error)
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VentureVerse | Login</title>

  <!-- Favicon (browser tab icon) -->
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}?v=3">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  TOP NAVIGATION BAR                                     -->
  <!--  Shows the VentureVerse logo + Login/SignUp links        -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <header class="topbar">
    <div class="container topbar-inner">

      <!-- Logo and brand name (links to home page) -->
      <a href="{{ url_for('home') }}" class="brand" style="text-decoration: none; color: inherit;">
        <div class="logo-mark">
          <div class="bar bar-1"></div>
          <div class="bar bar-2"></div>
          <div class="bar bar-3"></div>
        </div>
        <span class="brand-name">VentureVerse</span>
      </a>

      <!-- Navigation links -->
      <div class="nav-links">
        <a class="nav-pill active" href="{{ url_for('login') }}">Login</a>
        <a class="btn-nav" href="{{ url_for('signup') }}">Sign Up</a>
      </div>

    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  LOGIN FORM                                              -->
  <!--  Centered card with email + password fields              -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <main class="container">
    <div class="auth-wrapper animate-in">
      <div class="auth-card">

        <!-- Header text -->
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Sign in to access your prediction dashboard</p>
        </div>

        <!-- Show error message if login failed -->
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        <!-- Login form -->
        <form action="{{ url_for('login') }}" method="POST" class="auth-form">

          <!-- Email field -->
          <div class="field">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
          </div>

          <!-- Password field -->
          <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
          </div>

          <!-- Submit button -->
          <button class="btn-submit" type="submit" style="margin-top:8px;">Sign In &rarr;</button>
        </form>

        <!-- Link to signup page -->
        <div class="auth-footer">
          Don't have an account? <a href="{{ url_for('signup') }}">Create one</a>
        </div>

      </div>
    </div>
  </main>

</body>
</html>
