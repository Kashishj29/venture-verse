<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VentureVerse | Login</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}?v=3">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar"><div class="container topbar-inner"><div class="brand"><div class="logo-mark"><div class="bar bar-1"></div><div class="bar bar-2"></div><div class="bar bar-3"></div></div><span class="brand-name">VentureVerse</span></div><div class="nav-links"><a class="nav-pill active" href="{{ url_for('login') }}">Login</a><a class="btn-nav" href="{{ url_for('signup') }}">Sign Up</a></div></div></header>
  <main class="container"><div class="auth-wrapper animate-in"><div class="auth-card"><div class="auth-header"><h2>Welcome Back</h2><p>Sign in to access your prediction dashboard</p></div>{% if error %}<div class="error">{{ error }}</div>{% endif %}<form action="{{ url_for('login') }}" method="POST" class="auth-form"><div class="field"><label>Email Address</label><input type="email" name="email" placeholder="you@example.com" required></div><div class="field"><label>Password</label><input type="password" name="password" placeholder="Enter your password" required></div><button class="btn-submit" type="submit" style="margin-top:8px;">Sign In &rarr;</button></form><div class="auth-footer">Don't have an account? <a href="{{ url_for('signup') }}">Create one</a></div></div></div></main>
</body></html>
