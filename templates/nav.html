<header class="topbar">
  <div class="container topbar-inner">
    <div class="brand">
      <div class="logo-mark"><div class="bar bar-1"></div><div class="bar bar-2"></div><div class="bar bar-3"></div></div>
      <span class="brand-name">VentureVerse</span>
    </div>
    <div class="nav-links">
      {% if user_name %}<span class="user-badge">Hi, {{ user_name.split(' ')[0] }}</span>{% endif %}
      <a class="nav-pill {{ 'active' if active_page=='predict' }}" href="{{ url_for('home') }}">Predict</a>
      <a class="nav-pill {{ 'active' if active_page=='charts' }}" href="{{ url_for('charts') }}">Charts</a>
      <a class="nav-pill {{ 'active' if active_page=='insights' }}" href="{{ url_for('insights') }}">Insights</a>
      <a class="nav-pill {{ 'active' if active_page=='about' }}" href="{{ url_for('about') }}">About</a>
      {% if user_name %}<a class="btn-nav" href="{{ url_for('logout') }}">Logout</a>{% endif %}
    </div>
  </div>
</header>
